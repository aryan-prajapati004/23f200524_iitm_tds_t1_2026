name: Daily Update

on:
  schedule:
    - cron: '30 2 * * *'  # Runs daily at 2:30 AM UTC
  workflow_dispatch:  # Lets you test manually

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update status file by 23f2005524@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u)" > status.txt

      - name: Commit changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "23f2005524@ds.study.iitm.ac.in"
          git add status.txt
          git diff --staged --quiet || git commit -m "Daily update: $(date -u)"
          git push
